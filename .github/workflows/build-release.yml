name: Build and Release

on:
  push:
    paths-ignore:
      - '**.md'
      - LICENSE
      - .gitignore
      - '**.png'
      - Installers/README.txt
  # No path filter on pull_request: if this workflow is a required status
  # check, a path-skipped run would leave PRs stuck at "Expected". The
  # job-level guard below reports "skipped" instead, which counts as passing.
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # Skip the duplicate pull_request run for PRs from branches in this repo;
    # those are already built by the push trigger. PRs from forks still build.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Need history so the test-only diff below can compare against the
          # previous master tip (github.event.before).
          fetch-depth: 0

      # A push that only touches the test projects still needs to build and run
      # tests, but must not cut a release. Compute whether every changed file
      # lives under a test project so the release step can be skipped.
      - name: Detect test-only change
        id: changes
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $before = "${{ github.event.before }}"
          $onlyTests = "false"
          if ($before -and $before -notmatch '^0+$') {
            $files = git diff --name-only $before "${{ github.event.after }}" |
              Where-Object { $_ -ne "" }
            if ($files) {
              $nonTest = $files | Where-Object {
                # Treat test projects, CI/workflow files, installers, docs and common repo files
                # as non-user-impacting so they don't trigger a release.
                $_ -notmatch '^(DCSB\.Tests/|DCSB\.UITests/|\.github/|Installers/|docs?/|README\.md$|LICENSE$|\.gitignore$)'
              }
              if (-not $nonTest) { $onlyTests = "true" }
            }
          }
          "only_tests=$onlyTests" >> $env:GITHUB_OUTPUT
          Write-Host "Test-only change: $onlyTests"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore NuGet packages
        run: msbuild DCSB.sln -t:restore

      # The projects target .NET Framework 4.8.1, whose targeting pack is not
      # installed on GitHub runners. Install the reference assemblies from NuGet
      # into the standard targeting-pack location so MSBuild resolves them
      # (including the Facades folder) like a normal targeting pack.
      - name: Install .NET Framework 4.8.1 reference assemblies
        shell: pwsh
        run: |
          nuget install Microsoft.NETFramework.ReferenceAssemblies.net481 -Version 1.0.3 -OutputDirectory refpacks
          $source = "refpacks\Microsoft.NETFramework.ReferenceAssemblies.net481.1.0.3\build\.NETFramework\v4.8.1"
          $target = "${env:ProgramFiles(x86)}\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.8.1"
          New-Item -ItemType Directory -Force $target | Out-Null
          Copy-Item "$source\*" $target -Recurse -Force

      - name: Build
        run: msbuild DCSB.sln /p:Configuration=Release /m /verbosity:minimal

      - name: Run tests
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vstest = & $vswhere -latest -products * -find 'Common7\IDE\Extensions\TestPlatform\vstest.console.exe' | Select-Object -First 1
          if (-not $vstest) { throw "vstest.console.exe not found" }
          & $vstest "DCSB.Tests\bin\Release\DCSB.Tests.dll" /TestAdapterPath:"DCSB.Tests\bin\Release" /logger:trx
          exit $LASTEXITCODE

      - name: Read version from built executable
        id: version
        shell: pwsh
        run: |
          $version = (Get-Item "DCSB\bin\Release\DCSB.exe").VersionInfo.FileVersion
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build installer
        working-directory: Installer scripts
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\NSIS\makensis.exe" CreateInstaller.nsi'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: DCSB-installer
          path: Installers/DCSB_*.exe

      - name: Create release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && steps.changes.outputs.only_tests != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: DCSB ${{ steps.version.outputs.version }}
          files: Installers/DCSB_*.exe
          generate_release_notes: true
