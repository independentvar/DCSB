name: Build and Release

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - LICENSE
      - .gitignore
      - '**.png'
      - Installers/README.txt
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Superseded PR builds are disposable. Push and manual runs use their unique
# run id so closely spaced master merges can each produce their own release.
concurrency:
  group: build-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      release_required: ${{ steps.changes.outputs.release_required }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release policy
        id: changes
        shell: pwsh
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: |
          $required = 'false'
          if ('${{ github.event_name }}' -eq 'push') {
            # Validates the bump (throws on a missing one) and reports whether a
            # release is required, in a single invocation.
            $required = ./.github/scripts/version-policy.ps1 `
              -BaseRef $env:BEFORE_SHA `
              -HeadRef $env:AFTER_SHA `
              -DiffMode Direct
          }
          "release_required=$required" >> $env:GITHUB_OUTPUT
          Write-Host "Release required: $required"

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore DCSB.sln --locked-mode

      - name: Build
        run: dotnet build DCSB.sln -c Release --no-restore

      - name: Run tests
        shell: pwsh
        run: |
          & "DCSB.Tests\bin\Release\DCSB.Tests.exe"
          exit $LASTEXITCODE

      - name: Read version from built executable
        id: version
        shell: pwsh
        run: |
          $version = (Get-Item "DCSB\bin\Release\DCSB.exe").VersionInfo.FileVersion
          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            throw "Unexpected file version: $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Install NSIS
        run: choco install nsis --version=3.12.0 -y --no-progress

      - name: Build installer
        working-directory: Installer scripts
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\NSIS\makensis.exe" CreateInstaller.nsi'

      - name: Attest installer provenance
        if: steps.changes.outputs.release_required == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: Installers/DCSB_*.exe

      - name: Upload installer artifact
        if: steps.changes.outputs.release_required == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: DCSB-installer
          path: Installers/DCSB_*.exe
          if-no-files-found: error
          retention-days: 7

  release:
    if: github.event_name == 'push' && needs.build.outputs.release_required == 'true'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: write
    # This job intentionally has no checkout, so gh cannot infer the repository
    # from a git remote. Set it explicitly so `gh release` commands work.
    env:
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download installer
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: DCSB-installer
          path: Installers

      - name: Ensure version tag is new
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          $tag = "v$env:VERSION"
          $existing = gh api "repos/$env:GITHUB_REPOSITORY/git/matching-refs/tags/$tag" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) { throw 'Could not query existing version tags.' }
          if (@($existing).Count -gt 0) {
            throw "Tag $tag already exists; refusing to replace an existing release."
          }
          Write-Host "Tag $tag is available."

      - name: Create draft release
        id: create_release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: DCSB ${{ needs.build.outputs.version }}
          files: Installers/DCSB_*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: true

      - name: Check VirusTotal secret
        id: vt_check
        shell: pwsh
        env:
          VT_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          $hasKey = if ($env:VT_KEY) { 'true' } else { 'false' }
          "has_key=$hasKey" >> $env:GITHUB_OUTPUT

      # Informational only: a transient VirusTotal failure does not prevent a
      # release, but the installer is never public before this attempt finishes.
      - name: Scan installer with VirusTotal
        id: virus_total
        if: steps.vt_check.outputs.has_key == 'true'
        continue-on-error: true
        shell: pwsh
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          $installer = Get-ChildItem "Installers/DCSB_*.exe" | Select-Object -First 1
          if (-not $installer) { throw 'Installer not found.' }

          $uploadResponse = curl --fail-with-body --silent --show-error `
            -X POST 'https://www.virustotal.com/api/v3/files' `
            -H "x-apikey: $env:VIRUSTOTAL_API_KEY" `
            -F "file=@$($installer.FullName)"
          if ($LASTEXITCODE -ne 0) { throw 'VirusTotal upload failed.' }

          $analysisId = ($uploadResponse | ConvertFrom-Json).data.id
          if (-not $analysisId) { throw 'VirusTotal returned no analysis id.' }

          $statusJson = $null
          for ($i = 0; $i -lt 60; $i++) {
            Start-Sleep -Seconds 5
            $statusResponse = curl --fail-with-body --silent --show-error `
              -H "x-apikey: $env:VIRUSTOTAL_API_KEY" `
              "https://www.virustotal.com/api/v3/analyses/$analysisId"
            if ($LASTEXITCODE -ne 0) { continue }
            $statusJson = $statusResponse | ConvertFrom-Json
            $status = $statusJson.data.attributes.status
            Write-Host "Analysis status: $status"
            if ($status -eq 'completed') { break }
          }
          if ($statusJson.data.attributes.status -ne 'completed') {
            throw 'VirusTotal analysis did not complete in five minutes.'
          }

          $sha256 = $statusJson.meta.file_info.sha256
          $stats = $statusJson.data.attributes.stats
          if (-not $sha256 -or -not $stats) { throw 'VirusTotal report data is incomplete.' }

          $total = ($stats.PSObject.Properties | ForEach-Object { $_.Value } | Measure-Object -Sum).Sum
          $malicious = [int]$stats.malicious
          $reportUrl = "https://www.virustotal.com/gui/file/$sha256/detection"
          $prefix = if ($malicious -gt 5) { ':warning: ' } else { '' }
          $report = @"
          ## Antivirus report (VirusTotal)

          ${prefix}VirusTotal reported **$malicious / $total** engines as malicious at release time. Automated scan results are informational and do not prove that a file is safe or unsafe.

          [Full VirusTotal report]($reportUrl)
          "@

          $tag = "v$env:VERSION"
          $currentBody = (gh release view $tag --json body -q .body) -join "`n"
          if ($LASTEXITCODE -ne 0) { throw 'Could not read the draft release body.' }
          $newBody = $currentBody.TrimEnd() + "`n`n" + $report.Trim()
          $bodyFile = Join-Path $env:RUNNER_TEMP 'release-body.md'
          Set-Content -Path $bodyFile -Value $newBody -Encoding utf8
          gh release edit $tag --notes-file $bodyFile
          if ($LASTEXITCODE -ne 0) { throw 'Could not update the draft release body.' }

      - name: Publish release
        if: steps.create_release.outcome == 'success'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          gh release edit "v$env:VERSION" --draft=false
          if ($LASTEXITCODE -ne 0) { throw 'Could not publish the draft release.' }
