name: Build and Release

on:
  push:
    paths-ignore:
      - '**.md'
      - LICENSE
      - .gitignore
      - '**.png'
      - Installers/README.txt
  # No path filter on pull_request: if this workflow is a required status
  # check, a path-skipped run would leave PRs stuck at "Expected". The
  # job-level guard below reports "skipped" instead, which counts as passing.
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # Skip the duplicate pull_request run for PRs from branches in this repo;
    # those are already built by the push trigger. PRs from forks still build.
    # TEMPORARY: also let the dev/antivirus-vt-scan PR run so the VirusTotal
    # step can be exercised end-to-end from a PR build; revert once verified.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository || github.head_ref == 'dev/antivirus-vt-scan'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Need history so the test-only diff below can compare against the
          # previous master tip (github.event.before).
          fetch-depth: 0

      # A push that only touches the test projects still needs to build and run
      # tests, but must not cut a release. Compute whether every changed file
      # lives under a test project so the release step can be skipped.
      - name: Detect test-only change
        id: changes
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $before = "${{ github.event.before }}"
          $onlyTests = "false"
          if ($before -and $before -notmatch '^0+$') {
            $files = git diff --name-only $before "${{ github.event.after }}" |
              Where-Object { $_ -ne "" }
            if ($files) {
              $nonTest = $files | Where-Object {
                # Treat test projects, CI/workflow files, installers, docs and common repo files
                # as non-user-impacting so they don't trigger a release.
                $_ -notmatch '^(DCSB\.Tests/|DCSB\.UITests/|\.github/|Installers/|docs?/|README\.md$|LICENSE$|\.gitignore$)'
              }
              if (-not $nonTest) { $onlyTests = "true" }
            }
          }
          "only_tests=$onlyTests" >> $env:GITHUB_OUTPUT
          Write-Host "Test-only change: $onlyTests"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore NuGet packages
        run: msbuild DCSB.sln -t:restore

      # The projects target .NET Framework 4.8.1, whose targeting pack is not
      # installed on GitHub runners. Install the reference assemblies from NuGet
      # into the standard targeting-pack location so MSBuild resolves them
      # (including the Facades folder) like a normal targeting pack.
      - name: Install .NET Framework 4.8.1 reference assemblies
        shell: pwsh
        run: |
          nuget install Microsoft.NETFramework.ReferenceAssemblies.net481 -Version 1.0.3 -OutputDirectory refpacks
          $source = "refpacks\Microsoft.NETFramework.ReferenceAssemblies.net481.1.0.3\build\.NETFramework\v4.8.1"
          $target = "${env:ProgramFiles(x86)}\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.8.1"
          New-Item -ItemType Directory -Force $target | Out-Null
          Copy-Item "$source\*" $target -Recurse -Force

      - name: Build
        run: msbuild DCSB.sln /p:Configuration=Release /m /verbosity:minimal

      - name: Run tests
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vstest = & $vswhere -latest -products * -find 'Common7\IDE\Extensions\TestPlatform\vstest.console.exe' | Select-Object -First 1
          if (-not $vstest) { throw "vstest.console.exe not found" }
          & $vstest "DCSB.Tests\bin\Release\DCSB.Tests.dll" /TestAdapterPath:"DCSB.Tests\bin\Release" /logger:trx
          exit $LASTEXITCODE

      - name: Read version from built executable
        id: version
        shell: pwsh
        run: |
          $version = (Get-Item "DCSB\bin\Release\DCSB.exe").VersionInfo.FileVersion
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build installer
        working-directory: Installer scripts
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\NSIS\makensis.exe" CreateInstaller.nsi'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: DCSB-installer
          path: Installers/DCSB_*.exe

      - name: Create release
        # TEMPORARY: the pull_request OR-clause lets this run on the
        # dev/antivirus-vt-scan PR for testing; revert once VT is verified.
        if: (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev/antivirus-vt-scan') && steps.changes.outputs.only_tests != 'true') || (github.event_name == 'pull_request' && github.head_ref == 'dev/antivirus-vt-scan')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: DCSB ${{ steps.version.outputs.version }}
          files: Installers/DCSB_*.exe
          generate_release_notes: true

      - name: Check VirusTotal secret
        id: vt_check
        shell: pwsh
        env:
          VT_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          $has = if ($env:VT_KEY) { "true" } else { "false" }
          "has_key=$has" >> $env:GITHUB_OUTPUT

      - name: Run VirusTotal scan and update release body
        # TEMPORARY: the pull_request OR-clause lets this run on the
        # dev/antivirus-vt-scan PR for testing; revert once VT is verified.
        if: steps.vt_check.outputs.has_key == 'true' && ((github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev/antivirus-vt-scan') && steps.changes.outputs.only_tests != 'true') || (github.event_name == 'pull_request' && github.head_ref == 'dev/antivirus-vt-scan'))
        shell: pwsh
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Find the installer produced earlier
          $installer = Get-ChildItem "Installers\DCSB_*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $installer) {
            Write-Host "Installer not found, skipping VirusTotal scan"
            exit 0
          }
          $path = $installer.FullName
          Write-Host "Uploading $path to VirusTotal..."

          $uploadResp = curl -s -X POST "https://www.virustotal.com/api/v3/files" -H "x-apikey: $env:VIRUSTOTAL_API_KEY" -F "file=@$path"
          if (-not $uploadResp) { Write-Host "No response from VirusTotal"; exit 0 }
          try { $uploadJson = $uploadResp | ConvertFrom-Json } catch { Write-Host "Failed to parse upload response"; exit 0 }
          $analysisId = $uploadJson.data.id
          if (-not $analysisId) { Write-Host "No analysis id returned, skipping"; exit 0 }

          # Poll analysis status
          $status = ""
          for ($i=0; $i -lt 60; $i++) {
            Start-Sleep -Seconds 5
            $statusResp = curl -s -H "x-apikey: $env:VIRUSTOTAL_API_KEY" "https://www.virustotal.com/api/v3/analyses/$analysisId"
            if (-not $statusResp) { continue }
            try { $statusJson = $statusResp | ConvertFrom-Json } catch { continue }
            $status = $statusJson.data.attributes.status
            Write-Host "Analysis status: $status"
            if ($status -eq 'completed') { break }
          }

          if ($status -ne 'completed') { Write-Host "Analysis did not complete in time, skipping report"; exit 0 }

          # Extract file SHA256 and stats
          $sha256 = $statusJson.meta.file_info.sha256
          $stats = $statusJson.data.attributes.stats
          if (-not $sha256 -or -not $stats) { Write-Host "Missing report data"; exit 0 }
          $total = ($stats.PSObject.Properties | ForEach-Object { $_.Value } | Measure-Object -Sum).Sum
          $malicious = ($stats.malicious) -as [int]

          $reportMd = "## Antivirus report (VirusTotal)`n`n"
          $reportMd += "Detected: **$malicious / $total** engines.`n`n"
          $reportMd += "[Full VirusTotal report](https://www.virustotal.com/gui/file/$sha256/detection)`n"

          # Fetch current release body and append report
          $tag = "v$env:VERSION"
          Write-Host "Updating release $tag with VirusTotal report..."
          $current = gh release view $tag --json body -q .body 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "Failed to read release body, skipping"; exit 0 }

          $newBody = $current + "`n`n" + $reportMd

          gh release edit $tag --notes "$newBody"
