name: Build and Release

on:
  push:
    paths-ignore:
      - '**.md'
      - LICENSE
      - .gitignore
      - '**.png'
      - Installers/README.txt
  # No path filter on pull_request: if this workflow is a required status
  # check, a path-skipped run would leave PRs stuck at "Expected". The
  # job-level guard below reports "skipped" instead, which counts as passing.
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # Skip the duplicate pull_request run for PRs from branches in this repo;
    # those are already built by the push trigger. PRs from forks still build.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Need history so the test-only diff below can compare against the
          # previous master tip (github.event.before).
          fetch-depth: 0

      # A push that only touches the test projects still needs to build and run
      # tests, but must not cut a release. Compute whether every changed file
      # lives under a test project so the release step can be skipped.
      - name: Detect test-only change
        id: changes
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $before = "${{ github.event.before }}"
          $onlyTests = "false"
          if ($before -and $before -notmatch '^0+$') {
            $files = git diff --name-only $before "${{ github.event.after }}" |
              Where-Object { $_ -ne "" }
            if ($files) {
              $nonTest = $files | Where-Object {
                # Treat test projects, CI/workflow files, installers, docs and common repo files
                # as non-user-impacting so they don't trigger a release.
                $_ -notmatch '^(DCSB\.Tests/|DCSB\.UITests/|\.github/|Installers/|docs?/|README\.md$|LICENSE$|\.gitignore$)'
              }
              if (-not $nonTest) { $onlyTests = "true" }
            }
          }
          "only_tests=$onlyTests" >> $env:GITHUB_OUTPUT
          Write-Host "Test-only change: $onlyTests"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore DCSB.sln

      - name: Build
        run: dotnet build DCSB.sln -c Release --no-restore

      # DCSB.Tests runs under Microsoft.Testing.Platform (EnableMSTestRunner),
      # so the built test project is a self-launching executable whose exit code
      # reflects the result. Run it directly for reliable, visible output.
      - name: Run tests
        shell: pwsh
        run: |
          & "DCSB.Tests\bin\Release\DCSB.Tests.exe"
          exit $LASTEXITCODE

      - name: Read version from built executable
        id: version
        shell: pwsh
        run: |
          $version = (Get-Item "DCSB\bin\Release\DCSB.exe").VersionInfo.FileVersion
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build installer
        working-directory: Installer scripts
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\NSIS\makensis.exe" CreateInstaller.nsi'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: DCSB-installer
          path: Installers/DCSB_*.exe

      - name: Create release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && steps.changes.outputs.only_tests != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: DCSB ${{ steps.version.outputs.version }}
          files: Installers/DCSB_*.exe
          generate_release_notes: true

      - name: Check VirusTotal secret
        id: vt_check
        shell: pwsh
        env:
          VT_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          $has = if ($env:VT_KEY) { "true" } else { "false" }
          "has_key=$has" >> $env:GITHUB_OUTPUT

      - name: Run VirusTotal scan and update release body
        if: steps.vt_check.outputs.has_key == 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && steps.changes.outputs.only_tests != 'true'
        shell: pwsh
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Find the installer produced earlier
          $installer = Get-ChildItem "Installers\DCSB_*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $installer) {
            Write-Host "Installer not found, skipping VirusTotal scan"
            exit 0
          }
          $path = $installer.FullName
          Write-Host "Uploading $path to VirusTotal..."

          $uploadResp = curl -s -X POST "https://www.virustotal.com/api/v3/files" -H "x-apikey: $env:VIRUSTOTAL_API_KEY" -F "file=@$path"
          if (-not $uploadResp) { Write-Host "No response from VirusTotal"; exit 0 }
          try { $uploadJson = $uploadResp | ConvertFrom-Json } catch { Write-Host "Failed to parse upload response"; exit 0 }
          $analysisId = $uploadJson.data.id
          if (-not $analysisId) { Write-Host "No analysis id returned, skipping"; exit 0 }

          # Poll analysis status
          $status = ""
          for ($i=0; $i -lt 60; $i++) {
            Start-Sleep -Seconds 5
            $statusResp = curl -s -H "x-apikey: $env:VIRUSTOTAL_API_KEY" "https://www.virustotal.com/api/v3/analyses/$analysisId"
            if (-not $statusResp) { continue }
            try { $statusJson = $statusResp | ConvertFrom-Json } catch { continue }
            $status = $statusJson.data.attributes.status
            Write-Host "Analysis status: $status"
            if ($status -eq 'completed') { break }
          }

          if ($status -ne 'completed') { Write-Host "Analysis did not complete in time, skipping report"; exit 0 }

          # Extract file SHA256 and stats
          $sha256 = $statusJson.meta.file_info.sha256
          $stats = $statusJson.data.attributes.stats
          if (-not $sha256 -or -not $stats) { Write-Host "Missing report data"; exit 0 }
          $total = ($stats.PSObject.Properties | ForEach-Object { $_.Value } | Measure-Object -Sum).Sum
          $malicious = ($stats.malicious) -as [int]

          # Detections at or below this count are treated as expected
          # false positives (unsigned NSIS installers reliably trip a few
          # ML/heuristic engines). Above it, surface a warning instead.
          $threshold = 5
          $reportUrl = "https://www.virustotal.com/gui/file/$sha256/detection"

          $reportMd = "## Antivirus report (VirusTotal)`n`n"
          if ($malicious -le $threshold) {
            $reportMd += "Detected: **$malicious / $total** engines. This is a known false alarm, not a virus. Small free apps like this one aren't signed with a paid certificate, and some scanners automatically distrust any installer that isn't signed — even when it's completely safe. You can review the detailed results at the link below.`n`n"
          } else {
            $reportMd += ":warning: Detected: **$malicious / $total** engines — higher than expected for an unsigned installer. Review the full report before trusting this build.`n`n"
          }
          $reportMd += "[Full VirusTotal report]($reportUrl)`n"

          # Fetch current release body
          $tag = "v$env:VERSION"
          Write-Host "Updating release $tag with VirusTotal report..."
          # Capture as a single string. Native command output is returned as a
          # string[] (one element per line); joining with "`n" preserves the
          # body's newlines. Without this, the later regex/TrimEnd string
          # coercion joins the array with spaces and flattens it to one line.
          $current = (gh release view $tag --json body -q .body 2>$null) -join "`n"
          if ($LASTEXITCODE -ne 0) { Write-Host "Failed to read release body, skipping"; exit 0 }

          # Strip any previously appended antivirus report so re-runs replace
          # rather than accumulate it (the report is always appended last).
          $current = [regex]::Replace($current, '(?s)\s*## Antivirus report \(VirusTotal\).*$', '')
          $newBody = $current.TrimEnd() + "`n`n" + $reportMd

          # Write via a file so multi-line markdown keeps its newlines.
          $bodyFile = Join-Path $env:RUNNER_TEMP "release-body.md"
          Set-Content -Path $bodyFile -Value $newBody -Encoding UTF8
          gh release edit $tag --notes-file $bodyFile
