name: Build and Release

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # Skip the duplicate pull_request run for PRs from branches in this repo;
    # those are already built by the push trigger. PRs from forks still build.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore DCSB.sln

      # The projects target .NET Framework 4.5.2, whose targeting pack is not
      # installed on GitHub runners. Install the reference assemblies from NuGet
      # into the standard targeting-pack location so MSBuild resolves them
      # (including the Facades folder) like a normal targeting pack.
      - name: Install .NET Framework 4.5.2 reference assemblies
        shell: pwsh
        run: |
          nuget install Microsoft.NETFramework.ReferenceAssemblies.net452 -Version 1.0.3 -OutputDirectory refpacks
          $source = "refpacks\Microsoft.NETFramework.ReferenceAssemblies.net452.1.0.3\build\.NETFramework\v4.5.2"
          $target = "${env:ProgramFiles(x86)}\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.5.2"
          New-Item -ItemType Directory -Force $target | Out-Null
          Copy-Item "$source\*" $target -Recurse -Force

      - name: Build
        run: msbuild DCSB.sln /p:Configuration=Release /m /verbosity:minimal

      - name: Read version from built executable
        id: version
        shell: pwsh
        run: |
          $version = (Get-Item "DCSB\bin\Release\DCSB.exe").VersionInfo.FileVersion
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      # NAudio.Vorbis.dll was compiled against NVorbis 0.8.4.0 but the package
      # ships 0.8.5.0, so MSBuild does not copy NVorbis.dll transitively into
      # the app output. Copy it explicitly so the installer can pick it up.
      - name: Copy NVorbis.dll to build output
        shell: pwsh
        run: Copy-Item packages\NVorbis.*\lib\NVorbis.dll DCSB\bin\Release\ -Force

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build installer
        working-directory: Installer scripts
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\NSIS\makensis.exe" CreateInstaller.nsi'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DCSB-installer
          path: Installers/DCSB_*.exe

      - name: Create release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: DCSB ${{ steps.version.outputs.version }}
          files: Installers/DCSB_*.exe
          generate_release_notes: true
