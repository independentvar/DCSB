# Rebuilds the vendored ThirdParty\rnnoise\rnnoise.dll from the pinned upstream
# tag (see build-rnnoise.ps1 for the pins). Manual-only: dispatch it from the
# Actions tab after bumping the pins, download the artifact, commit the new dll.
# This keeps GitHub's MSVC image as the canonical build environment - no
# developer machine needs a C toolchain.
name: Build rnnoise.dll

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [ci/build-rnnoise]

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write
    concurrency:
      group: rnnoise-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build rnnoise.dll from pinned tag
        shell: pwsh
        run: ./ThirdParty/rnnoise/build-rnnoise.ps1

      - name: Attest dll provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: ThirdParty/rnnoise/rnnoise.dll

      - name: Upload dll artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rnnoise-dll
          path: |
            ThirdParty/rnnoise/rnnoise.dll
            ThirdParty/rnnoise/COPYING
          if-no-files-found: error
          retention-days: 14
