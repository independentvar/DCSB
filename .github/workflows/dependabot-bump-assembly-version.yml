name: Dependabot — bump AssemblyVersion

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  bump-assembly-version:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Get changed files
        id: changes
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          git fetch origin $BASE --no-tags
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" || true)
          echo "$CHANGED" > changed.txt
          echo "Changed files:\n$CHANGED"

      - name: Skip if only tests/docs/CI changed or AssemblyVersionInfo already updated
        run: |
          CHANGED=$(cat changed.txt || true)
          # Ignore tests, UI tests, .github, docs and README
          FILTERED=$(echo "$CHANGED" | grep -vE '^(DCSB.Tests/|DCSB.UITests/|\\.github/|docs/|README.md)' || true)

          if [ -z "$FILTERED" ]; then
            echo "No shipped-code changes detected. Exiting."
            exit 0
          fi

          if echo "$CHANGED" | grep -q '^AssemblyVersionInfo.cs$'; then
            echo "AssemblyVersionInfo.cs already changed in this PR. Exiting."
            exit 0
          fi

      - name: Bump third component (patch) and set fourth to 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE=AssemblyVersionInfo.cs
          if [ ! -f "$FILE" ]; then echo "File not found: $FILE"; exit 1; fi

          # Extract first matched version like 1.2.3.4
          VER=$(grep -oP 'Assembly(?:File)?Version\("\K[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+(?="\))' "$FILE" | head -n1)
          if [ -z "$VER" ]; then echo "Could not parse version from $FILE"; exit 1; fi

          IFS='.' read -r MA MI PA BU <<< "$VER"
          PA=$((PA + 1))
          BU=0
          NEW_VERSION="${MA}.${MI}.${PA}.${BU}"

          echo "Current: $VER -> New: $NEW_VERSION"

          # Replace both AssemblyVersion("x.x.x.x") and AssemblyFileVersion("x.x.x.x") occurrences
          perl -0777 -pe "s/Assembly(File)?Version\(\"[0-9]+(?:\.[0-9]+){3}\"\)/Assembly\$1Version(\"${NEW_VERSION}\")/g" -i "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          if git commit -m "Bump AssemblyVersion to ${NEW_VERSION} (dependabot auto-bump)"; then
            echo "Committed version bump"
            git push origin "HEAD:${{ github.head_ref }}"
          else
            echo "No changes to commit"
          fi
