name: Validate AssemblyVersion bump

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  require-version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --no-tags

      - name: Ensure AssemblyVersionInfo.cs bumped when shipped code changes
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only FETCH_HEAD...HEAD || true)
          echo "Changed files:\n$CHANGED"

          # If AssemblyVersionInfo.cs was changed, pass
          if echo "$CHANGED" | grep -q '^AssemblyVersionInfo.cs$'; then
            echo "AssemblyVersionInfo.cs changed — OK"
            exit 0
          fi

          # Ignore changes that don't affect the shipped app: tests, docs, CI
          # config, installer tooling, and the repo-root .gitignore. The installer
          # scripts build the package but don't change the app binaries themselves.
          FILTERED=$(echo "$CHANGED" | grep -vE '^(DCSB.Tests/|DCSB.UITests/|\.github/|Installer scripts/|docs/|README.md|\.gitignore$)' || true)

          if [ -z "$FILTERED" ]; then
            echo "Only test/docs/CI/installer files changed — no version bump required"
            exit 0
          fi

          echo "ERROR: This PR changes shipped code but AssemblyVersionInfo.cs was not updated."
          echo "Please increment AssemblyVersion and AssemblyFileVersion in AssemblyVersionInfo.cs in this PR."
          exit 1
